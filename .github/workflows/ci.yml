# CI pipeline for pull requests targeting main.
# Runs five parallel jobs:
#   - frontend-lint:    ESLint, Stylelint, and hygiene checks
#   - frontend-compile: TypeScript compilation and layer validation
#   - csp-hash-check:   Verify CSP SHA-256 hash matches inline script content
#   - backend-lint:     Clippy for the Tauri/Rust backend
#   - backend-format:   rustfmt check for the Tauri/Rust backend
#
# Uses dorny/paths-filter so that each job runs only when relevant files change,
# while remaining compatible with branch protection required status checks.
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'extensions/**'
              - 'build/**'
              - 'test/**'
              - 'package.json'
              - 'package-lock.json'
              - '.nvmrc'
              - 'eslint.config.js'
              - '.eslint-ignore'
              - '.eslint-plugin-local/**'
              - 'tsfmt.json'
              - '.editorconfig'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'src-tauri/**'
              - '.github/workflows/ci.yml'

  frontend-lint:
    name: Frontend Lint
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-cache

      - name: ESLint
        run: npm run eslint

      - name: Stylelint
        run: npm run stylelint

      - name: Hygiene
        run: npm run hygiene

  frontend-compile:
    name: Frontend Compile Check
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-cache

      - name: TypeScript compile check
        run: npm run compile-check-ts-native

      - name: Valid layers check
        run: npm run valid-layers-check

  csp-hash-check:
    name: CSP Hash Check
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          sparse-checkout: |
            src/vs/workbench/contrib/webview/browser/pre/index.html

      - name: Verify CSP SHA-256 hash
        run: |
          python3 << 'PYEOF'
          import hashlib, base64, re, sys

          INDEX_HTML = "src/vs/workbench/contrib/webview/browser/pre/index.html"

          with open(INDEX_HTML, "r") as f:
              content = f.read()

          # Extract inline script content (between <script async type="module"> and </script>)
          script_match = re.search(
              r'<script\s+async\s+type="module">(.*?)</script>',
              content,
              re.DOTALL,
          )
          if not script_match:
              print("::error::Could not find inline <script async type=\"module\"> in " + INDEX_HTML)
              sys.exit(1)

          script_body = script_match.group(1)

          # Compute SHA-256 of the script content
          computed = base64.b64encode(
              hashlib.sha256(script_body.encode("utf-8")).digest()
          ).decode()
          computed_full = f"sha256-{computed}"

          # Extract the hash declared in the CSP meta tag
          csp_match = re.search(
              r"script-src\s+'(sha256-[A-Za-z0-9+/=]+)'",
              content,
          )
          if not csp_match:
              print("::error::Could not find script-src sha256 hash in CSP meta tag")
              sys.exit(1)

          declared = csp_match.group(1)

          if computed_full == declared:
              print(f"CSP hash OK: {declared}")
          else:
              print(f"::error::CSP hash mismatch!")
              print(f"  Declared in CSP: {declared}")
              print(f"  Computed:        {computed_full}")
              print()
              print(f"Update the script-src hash in {INDEX_HTML} to:")
              print(f"  {computed_full}")
              sys.exit(1)
          PYEOF

  backend-lint:
    name: Backend Lint
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Create empty out/ directory so tauri::generate_context!() can resolve frontendDist: "../out"
      # Create empty css-modules.json so bundle.resources validation passes
      # Create empty node sidecar stub so externalBin validation passes
      # Create empty node_modules/ stub so bundle.resources "node_modules/" validation passes
      - name: Create build stubs
        run: |
          mkdir -p out
          echo '[]' > src-tauri/css-modules.json
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/node-x86_64-unknown-linux-gnu
          mkdir -p src-tauri/node_modules

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  backend-format:
    name: Backend Format
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            src-tauri

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check format
        working-directory: src-tauri
        run: cargo fmt --check

  # Gate job: aggregates all job results into a single required status check.
  # This job always runs (even when other jobs are skipped by paths-filter),
  # making it safe to use as a required status check in branch protection.
  ci-gate:
    name: CI Gate
    if: ${{ always() }}
    needs: [frontend-lint, frontend-compile, csp-hash-check, backend-lint, backend-format]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check job results
        run: |
          results=("${{ needs.frontend-lint.result }}" "${{ needs.frontend-compile.result }}" "${{ needs.csp-hash-check.result }}" "${{ needs.backend-lint.result }}" "${{ needs.backend-format.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::One or more CI jobs failed or were cancelled."
              exit 1
            fi
          done
          echo "All CI jobs passed or were skipped."
