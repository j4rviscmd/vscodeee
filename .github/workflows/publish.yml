# https://github.com/tauri-apps/tauri-action
#
# Release workflow — builds platform-native installers and publishes to GitHub Releases.
# Triggered on every push to main; the preflight job skips the run if a release
# for the current version (read from src-tauri/tauri.conf.json) already exists.
#
# Jobs:
#   1. preflight           — deduplication gate + orphaned tag cleanup
#   2. generate-notes      — auto-generate release notes via GitHub API
#   3. create-release      — create git tag + draft release (gateway for parallel builds)
#   4. publish-tauri       — cross-platform build matrix (macOS arm64/x64, Linux, Windows)
#   5. build-reh           — build REH (Remote Extension Host) server for SSH remotes
#   6. upload-stable-assets — upload fixed-name copies + publish draft release
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight — check if release already exists
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for existing tag/release v__VERSION__
        id: check
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let version = '';
            try {
              version = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')).version || '';
            } catch (e) {
              core.info(`Failed reading tauri.conf.json: ${e.message}`);
            }
            if (!version) {
              core.setFailed('Unable to determine version from src-tauri/tauri.conf.json');
              return;
            }
            const tag = `v${version}`;
            core.setOutput('version', version);
            core.setOutput('tag', tag);
            core.info(`Checking if tag or release exists for ${tag} ...`);

            // Check if a release already exists (single listReleases call)
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            if (releases.data.find(r => r.tag_name === tag)) {
              core.info(`Release for ${tag} already exists. Skipping.`);
              core.setOutput('skip', 'true');
              return;
            }

            // No release — check for orphaned tag and clean up if present
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              core.warning(`Orphaned tag ${tag} found with no release. Deleting.`);
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
              core.info(`Deleted orphaned tag ${tag}. Proceeding with release.`);
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            core.info(`OK: ${tag} does not exist. Proceeding with release.`);
            core.setOutput('skip', 'false');

  generate-notes:
    name: Generate release notes
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.notes.outputs.notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate release notes via GitHub API
        id: notes
        uses: actions/github-script@v9
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG;

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: 'main',
            };

            // Use previous release as baseline if available
            try {
              const { data: latest } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              params.previous_tag_name = latest.tag_name;
            } catch (e) {
              core.info('No previous release found, generating full notes');
            }

            const { data } = await github.rest.repos.generateReleaseNotes(params);
            core.setOutput('notes', data.body);

  create-release:
    name: Create draft release
    needs: [preflight, generate-notes]
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create.outputs.release-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create tag and draft release
        id: create
        uses: actions/github-script@v9
        env:
          RELEASE_NOTES: ${{ needs.generate-notes.outputs.notes }}
          TAG: ${{ needs.preflight.outputs.tag }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG;

            // Create git tag pointing at HEAD
            const ref = `tags/${tag}`;
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref,
              });
              core.info(`Tag ${tag} already exists, skipping tag creation`);
            } catch (e) {
              if (e.status !== 404) throw e;
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/${ref}`,
                sha: context.sha,
              });
              core.info(`Created tag ${tag}`);
            }

            // Create draft release (idempotent on re-run)
            const notes = process.env.RELEASE_NOTES;
            let release;
            try {
              const resp = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body: notes,
                draft: true,
                prerelease: false,
                target_commitish: 'main',
              });
              release = resp.data;
              core.info(`Created draft release ${release.html_url}`);
            } catch (e) {
              if (e.status !== 422) throw e;
              // Release already exists — find it by listing and filtering
              const releases = await github.paginate(github.rest.repos.listReleases, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              release = releases.find(r => r.tag_name === tag);
              if (!release) throw new Error(`Release with tag ${tag} not found`);
              core.info(`Found existing release ${release.html_url}`);
            }
            core.setOutput('release-id', release.id);

  publish-tauri:
    needs: [preflight, generate-notes, create-release]
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxkbfile-dev pkg-config libkrb5-dev libxss1

      - name: Install frontend dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create placeholder to prevent postinstall symlink error
          touch .github/copilot-instructions.md
          npm ci

      - name: Download Node.js sidecar binary
        shell: bash
        run: |
          # Extract --target value from args; fall back to host triple for native builds
          TARGET=$(echo "${{ matrix.args }}" | sed -n 's/.*--target \([^ ]*\).*/\1/p')
          if [ -z "$TARGET" ]; then
            TARGET=$(rustc --print host-tuple)
          fi
          node scripts/download-node.mjs --target "$TARGET"

      - name: Build and publish with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          tagName: ${{ needs.preflight.outputs.tag }}
          releaseName: ${{ needs.preflight.outputs.tag }}
          releaseBody: ${{ needs.generate-notes.outputs.notes }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  build-reh:
    name: Build REH Server (${{ matrix.os }}-${{ matrix.arch }})
    needs: [preflight, generate-notes, create-release]
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: write
    env:
      RELEASE_ID: ${{ needs.create-release.outputs.release-id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-22.04
          - os: linux
            arch: arm64
            runner: ubuntu-22.04
          - os: linux
            arch: armhf
            runner: ubuntu-22.04
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: darwin
            arch: x64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      # Free memory by removing large pre-installed software.
      # GitHub-hosted runners have ~7GB RAM but the gulp build needs ~8GB.
      # Removing unused toolchains reclaims ~3-4GB of disk cache pressure,
      # and combined with swap below, prevents OOM kills.
      - name: Free disk space and memory (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "=== Before cleanup ==="
          free -h
          df -h /
          # Remove large pre-installed tools that consume memory/cache
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /opt/hostedtoolcache/go || true
          sudo rm -rf /opt/hostedtoolcache/Ruby || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/local/share/chromium || true
          # Prune Docker images to free memory-mapped files
          sudo docker image prune --all --force || true
          # Drop filesystem caches to reclaim memory
          sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' || true
          echo "=== After cleanup ==="
          free -h
          df -h /

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbfile-dev pkg-config libkrb5-dev libsecret-1-dev

      # The gulp compilation step requires ~8GB memory (--max-old-space-size=8192)
      # but GitHub-hosted ubuntu runners only have 7GB RAM. Add swap to prevent OOM kills.
      # Combined with the cleanup step above, this gives ~7GB RAM + 8GB swap = ~15GB virtual memory.
      - name: Setup swap space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo swapoff -a
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap enabled: $(swapon --show)"
          free -h

      - name: Set up QEMU (Linux ARM cross-compilation)
        if: matrix.os == 'linux' && matrix.arch != 'x64'
        uses: docker/setup-qemu-action@v4

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create placeholder to prevent postinstall symlink error
          touch .github/copilot-instructions.md
          npm ci

      # The mangler spawns worker threads (default 4) each inheriting the main
      # process's V8 heap limit. On GitHub-hosted ubuntu-22.04 (15GB RAM + 8GB swap),
      # 4 workers × 6GB + main 6GB = 30GB total, far exceeding the 23GB available.
      #
      # NODE_OPTIONS does NOT limit worker_threads heap — they inherit the parent's
      # V8 isolate settings. Only resourceLimits or reducing worker count helps.
      #
      # Solution: MANGLER_MAX_WORKERS=1 reduces to 1 worker thread.
      # - Main process: 6GB (CLI flag --max-old-space-size=6144)
      # - Worker thread: 1 × ~6GB (inherits main's limit)
      # - Peak total: ~12GB << 23GB available
      # On 2-vCPU runners, 1 worker is optimal anyway (no context switching overhead).
      - name: Build REH server
        env:
          MANGLER_MAX_WORKERS: "1"
        run: node --max-old-space-size=6144 ./node_modules/gulp/bin/gulp.js vscode-reh-${{ matrix.os }}-${{ matrix.arch }}-min

      # For Linux ARM, replace host-compiled native modules with target-arch ones
      - name: Cross-compile remote dependencies (Linux ARM)
        if: matrix.os == 'linux' && matrix.arch != 'x64'
        run: |
          DEST="../vscode-reh-${{ matrix.os }}-${{ matrix.arch }}"
          DOCKER_PLATFORM="linux/${{ matrix.arch == 'armhf' && 'arm/v7' || matrix.arch }}"

          # Remove host-compiled native modules from the packaged output
          rm -rf "$DEST/node_modules"

          # Reinstall for target arch via Docker + QEMU
          docker run --rm \
            --platform "$DOCKER_PLATFORM" \
            -e GITHUB_TOKEN \
            -v "$PWD/remote:/workspace" \
            -w /workspace \
            node:22 \
            bash -c "
              apt-get update && \
              apt-get install -y --no-install-recommends \
                libxkbfile-dev libkrb5-dev libsecret-1-dev python3 make g++ && \
              rm -rf node_modules && \
              npm install --omit=dev
            "

          # Copy cross-compiled modules into the package
          cp -r remote/node_modules "$DEST/"

      - name: Create tarball
        run: |
          cd ..
          tar -czf vscodeee-reh-${{ matrix.os }}-${{ matrix.arch }}.tar.gz \
            -C vscode-reh-${{ matrix.os }}-${{ matrix.arch }} .

      - name: Upload REH server to release
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = Number(process.env.RELEASE_ID);
            if (!releaseId || isNaN(releaseId)) {
              core.setFailed('RELEASE_ID is not set or invalid');
              return;
            }

            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            const assetName = `vscodeee-reh-${{ matrix.os }}-${{ matrix.arch }}.tar.gz`;
            const filePath = path.join('..', assetName);
            const data = fs.readFileSync(filePath);

            // Delete existing asset if re-running
            const existing = release.assets.find(a => a.name === assetName);
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
              core.info(`Deleted old asset: ${assetName}`);
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: assetName,
              data,
            });
            core.info(`Uploaded ${assetName} to release ${releaseId}`);

  upload-stable-assets:
    name: Upload fixed-name assets for README links
    needs: [preflight, publish-tauri, build-reh, create-release]
    if: needs.preflight.outputs.skip != 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      RELEASE_ID: ${{ needs.create-release.outputs.release-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upload fixed-name copies
        uses: actions/github-script@v9
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = process.env.VERSION;
            const releaseId = Number(process.env.RELEASE_ID);
            if (!releaseId || isNaN(releaseId)) {
              core.setFailed('RELEASE_ID is not set or invalid');
              return;
            }

            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            // Mapping: versioned asset name pattern → fixed name
            const renames = [
              { match: `_${version}_aarch64.dmg`, fixedName: 'VSCodeee_macOS_arm64.dmg' },
              { match: `_${version}_x64.dmg`, fixedName: 'VSCodeee_macOS_x64.dmg' },
              { match: `_${version}_amd64.AppImage`, fixedName: 'VSCodeee_Linux_x64.AppImage' },
              { match: `_${version}_amd64.deb`, fixedName: 'VSCodeee_Linux_x64.deb' },
              { match: `_${version}_x64-setup.exe`, fixedName: 'VSCodeee_Windows_x64-setup.exe' },
            ];

            // Remove old fixed-name assets if they exist from a previous run
            for (const { fixedName } of renames) {
              const existing = release.assets.find(a => a.name === fixedName);
              if (existing) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: existing.id,
                });
                core.info(`Deleted old asset: ${fixedName}`);
              }
            }

            for (const { match, fixedName } of renames) {
              const asset = release.assets.find(a => a.name.endsWith(match));
              if (!asset) {
                core.warning(`Asset matching *${match} not found, skipping ${fixedName}`);
                continue;
              }
              // Download the versioned asset
              const download = await github.rest.repos.getReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
                headers: { accept: 'application/octet-stream' },
              });
              // Upload with fixed name
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: fixedName,
                data: Buffer.from(download.data),
              });
              core.info(`Uploaded ${fixedName} (from ${asset.name})`);
            }

      - name: Verify all expected assets and publish release
        uses: actions/github-script@v9
        env:
          TAG: ${{ needs.preflight.outputs.tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = process.env.VERSION;
            const tag = process.env.TAG;
            const releaseId = Number(process.env.RELEASE_ID);
            if (!releaseId || isNaN(releaseId)) {
              core.setFailed('RELEASE_ID is not set or invalid');
              return;
            }

            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            const assetNames = release.assets.map(a => a.name);

            // Expected Tauri desktop assets (4 platforms)
            const expectedTauri = [
              `_${version}_aarch64.dmg`,
              `_${version}_x64.dmg`,
              `_${version}_amd64.AppImage`,
              `_${version}_x64-setup.exe`,
            ];
            // Expected REH server assets (5 targets)
            const expectedReh = [
              'vscodeee-reh-linux-x64.tar.gz',
              'vscodeee-reh-linux-arm64.tar.gz',
              'vscodeee-reh-linux-armhf.tar.gz',
              'vscodeee-reh-darwin-arm64.tar.gz',
              'vscodeee-reh-darwin-x64.tar.gz',
            ];

            const missingTauri = expectedTauri.filter(p => !assetNames.some(n => n.endsWith(p)));
            const missingReh = expectedReh.filter(p => !assetNames.includes(p));
            const missing = [...missingTauri, ...missingReh];

            if (missing.length > 0) {
              core.setFailed(`Missing required assets, not publishing: ${missing.join(', ')}`);
              return;
            }

            core.info(`All ${expectedTauri.length + expectedReh.length} expected assets present. Publishing release.`);
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
            core.info(`Published release ${tag} (${release.html_url})`);
