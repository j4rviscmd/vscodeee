<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			http-equiv="Content-Security-Policy"
			content="
				default-src
					'self'
					tauri:
					https://tauri.localhost
				;
				img-src
					'self'
					data:
					blob:
					https:
					tauri:
					https://tauri.localhost
				;
				media-src
					'self'
				;
				frame-src
					'self'
				;
				script-src
					'self'
					'unsafe-eval'
					'unsafe-inline'
					blob:
					tauri:
					https://tauri.localhost
				;
				style-src
					'self'
					'unsafe-inline'
				;
				connect-src
					'self'
					https:
					ws:
					wss:
					tauri:
					https://tauri.localhost
					ipc:
				;
				font-src
					'self'
					https:
				;
		"/>

		<link rel="stylesheet" href="pty-poc/dist/terminal.css" />
		<title>VS Codee</title>

		<style>
			/* Splash screen — minimal styling for the PoC */
			body {
				margin: 0;
				padding: 0;
				overflow: hidden;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
					Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
				background-color: #1e1e1e;
				color: #cccccc;
			}

			.splash {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100vh;
				gap: 16px;
			}

			.splash h1 {
				font-size: 28px;
				font-weight: 300;
				color: #ffffff;
			}

			.splash .subtitle {
				font-size: 14px;
				color: #858585;
			}

			.splash .status {
				font-size: 12px;
				color: #569cd6;
				margin-top: 24px;
			}

			.splash .info {
				font-size: 11px;
				color: #666666;
				max-width: 600px;
				text-align: left;
				background: #252526;
				padding: 16px;
				border-radius: 4px;
				font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
				line-height: 1.6;
				white-space: pre-wrap;
			}

			.splash .badge {
				display: inline-block;
				background: #007acc;
				color: white;
				padding: 2px 8px;
				border-radius: 3px;
				font-size: 11px;
				font-weight: 600;
			}

			.splash .success {
				color: #4ec9b0;
			}

			.splash .error {
				color: #f48771;
			}

			/* Phase 0-4: Terminal PoC styles */
			#terminal-section {
				width: 100%;
				max-width: 900px;
				margin-top: 16px;
			}

			#terminal-section .terminal-header {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 8px;
			}

			#terminal-container {
				width: 100%;
				height: 400px;
				background: #000;
				border-radius: 4px;
				overflow: hidden;
				display: none;
			}

			#terminal-container.active {
				display: block;
			}

			.terminal-controls {
				display: flex;
				gap: 8px;
				margin-top: 8px;
			}

			.terminal-controls button {
				padding: 6px 12px;
				background: #333;
				color: #ccc;
				border: 1px solid #555;
				border-radius: 3px;
				cursor: pointer;
				font-size: 12px;
			}

			.terminal-controls button:hover {
				background: #444;
			}

			.terminal-controls button.primary {
				background: #007acc;
				color: #fff;
				border: none;
			}

			.terminal-controls button.danger {
				background: #a1260d;
				color: #fff;
				border: none;
			}
		</style>
	</head>

	<body>
		<div class="splash" id="splash">
			<h1>⚡ VS Codee</h1>
			<div class="subtitle">Powered by Tauri 2.0</div>
			<div class="status" id="status">Initializing...</div>
			<div class="info" id="info"></div>
		</div>

		<script>
			(async function () {
				performance.mark('code/didStartRenderer');

				const statusEl = document.getElementById('status');
				const infoEl = document.getElementById('info');

				function log(msg, isError) {
					const line = `[${new Date().toISOString().slice(11, 23)}] ${msg}`;
					infoEl.textContent += line + '\n';
					if (isError) {
						statusEl.className = 'status error';
					}
					console.log(line);
				}

				try {
					// Step 1: Check Tauri API availability
					statusEl.textContent = 'Checking Tauri API...';
					log('Phase 0-1: Tauri Feasibility Spike');
					log('─────────────────────────────────');

					if (window.__TAURI__) {
						log('✅ Tauri API available (window.__TAURI__)');
					} else {
						log('❌ Tauri API not found — not running in Tauri?', true);
						statusEl.textContent = '❌ Tauri API not available';
						return;
					}

					// Step 2: Invoke Rust command to get native host info
					statusEl.textContent = 'Querying native host info...';
					const { invoke } = window.__TAURI__.core;

					const hostInfo = await invoke('get_native_host_info');
					log(`✅ Native host info received:`);
					log(`   platform: ${hostInfo.platform}`);
					log(`   arch:     ${hostInfo.arch}`);
					log(`   hostname: ${hostInfo.hostname}`);
					log(`   homeDir:  ${hostInfo.homeDir}`);
					log(`   tmpDir:   ${hostInfo.tmpDir}`);

					// Step 3: Get window configuration
					const windowConfig = await invoke('get_window_configuration');
					log(`✅ Window configuration received:`);
					log(`   windowId: ${windowConfig.windowId}`);
					log(`   logLevel: ${windowConfig.logLevel}`);

					// Step 4: Test custom protocol (vscode-file://)
					statusEl.textContent = 'Testing custom protocol...';
					try {
						const protoResp = await fetch('vscode-file://vscode-app/nonexistent');
						log(`✅ vscode-file:// protocol responded (status: ${protoResp.status})`);
					} catch (e) {
						log(`⚠️  vscode-file:// protocol test: ${e.message}`);
					}

					// Step 5: Report WebView capabilities
					statusEl.textContent = 'Checking WebView capabilities...';
					log('─────────────────────────────────');
					log('WebView Environment:');
					log(`   userAgent: ${navigator.userAgent.slice(0, 80)}...`);
					log(`   platform:  ${navigator.platform}`);
					log(`   language:  ${navigator.language}`);
					log(`   webgl:     ${!!document.createElement('canvas').getContext('webgl2') ? 'WebGL2 ✅' : 'No WebGL2 ⚠️'}`);

					// Check CSS features needed by Monaco Editor
					const monacoFeatures = {
						'CSS Grid': CSS.supports('display', 'grid'),
						'CSS Variables': CSS.supports('color', 'var(--test)'),
						'Backdrop Filter': CSS.supports('backdrop-filter', 'blur(10px)'),
						'Container Queries': CSS.supports('container-type', 'inline-size'),
					};
					log('Monaco Editor CSS prerequisites:');
					for (const [feature, supported] of Object.entries(monacoFeatures)) {
						log(`   ${feature}: ${supported ? '✅' : '❌'}`);
					}

					// Performance measurement
					performance.mark('code/didFinishBootstrap');
					const bootTime = performance.measure('bootstrap', 'code/didStartRenderer', 'code/didFinishBootstrap');

					log('─────────────────────────────────');
					log(`🚀 Bootstrap completed in ${bootTime.duration.toFixed(1)}ms`);

					statusEl.textContent = '✅ Feasibility Spike: All checks passed!';
					statusEl.className = 'status success';

					// Step 6: Extension Host Sidecar PoC (Phase 0-2)
					log('');
					log('Phase 0-2: Extension Host Sidecar PoC');
					log('─────────────────────────────────');
					log('Click the button below to spawn ExtHost and run handshake.');

					const btn = document.createElement('button');
					btn.textContent = '🔌 Spawn Extension Host';
					btn.style.cssText = 'margin-top:12px;padding:8px 16px;background:#007acc;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;';
					btn.onclick = async () => {
						btn.disabled = true;
						btn.textContent = '⏳ Spawning...';
						statusEl.textContent = 'Spawning Extension Host...';
						statusEl.className = 'status';
						log('Spawning Node.js Extension Host sidecar...');
						try {
							const result = await invoke('spawn_extension_host');
							if (result.success) {
								log(`✅ Handshake succeeded!`);
								log(`   pipe:     ${result.pipePath}`);
								log(`   pid:      ${result.extHostPid}`);
								log(`   duration: ${result.handshakeDurationMs}ms`);
								log(`   messages: ${result.messagesExchanged.length}`);
								for (const m of result.messagesExchanged) {
									log(`     ${m}`);
								}
								statusEl.textContent = `✅ ExtHost handshake OK (${result.handshakeDurationMs}ms)`;
								statusEl.className = 'status success';
							} else {
								log(`❌ Handshake failed: ${result.error}`, true);
								statusEl.textContent = `❌ ExtHost: ${result.error}`;
							}
						} catch (e) {
							log(`❌ invoke error: ${e}`, true);
							statusEl.textContent = `❌ ${e}`;
						}
						btn.disabled = false;
						btn.textContent = '🔌 Spawn Extension Host';
					};
					document.getElementById('splash').appendChild(btn);

					// Step 7: Terminal PoC (Phase 0-4)
					log('');
					log('Phase 0-4: Terminal (PTY Host) PoC');
					log('─────────────────────────────────');
					log('Click the button below to spawn a terminal.');

					// Create terminal section
					const termSection = document.createElement('div');
					termSection.id = 'terminal-section';
					termSection.innerHTML = `
						<div class="terminal-header">
							<span class="badge">Phase 0-4</span>
							<span style="font-size:12px;color:#858585">Terminal (PTY Host) PoC</span>
						</div>
						<div id="terminal-container"></div>
						<div class="terminal-controls">
							<button class="primary" id="btn-new-terminal">New Terminal</button>
							<button class="danger" id="btn-close-terminal" disabled>Close Terminal</button>
							<span id="terminal-status" style="font-size:11px;color:#666;line-height:28px;margin-left:8px"></span>
						</div>
					`;
					document.getElementById('splash').appendChild(termSection);

					let currentTerminal = null;
					const termContainer = document.getElementById('terminal-container');
					const btnNew = document.getElementById('btn-new-terminal');
					const btnClose = document.getElementById('btn-close-terminal');
					const termStatus = document.getElementById('terminal-status');

					btnNew.onclick = async () => {
						if (!window.PtyPoc) {
							log('❌ PtyPoc module not loaded. Is pty-poc/dist/terminal.js missing?', true);
							return;
						}
						btnNew.disabled = true;
						termStatus.textContent = 'Spawning...';
						log('Creating new terminal...');
						try {
							const startTime = performance.now();
							termContainer.innerHTML = '';
							termContainer.classList.add('active');
							currentTerminal = await window.PtyPoc.createTerminal(termContainer);
							const elapsed = (performance.now() - startTime).toFixed(1);
							log(`✅ Terminal created (id: ${currentTerminal.id}, ${elapsed}ms)`);
							termStatus.textContent = `Terminal #${currentTerminal.id} active (spawned in ${elapsed}ms)`;
							termStatus.style.color = '#4ec9b0';
							btnClose.disabled = false;
							currentTerminal.terminal.focus();
						} catch (e) {
							log(`❌ Terminal creation failed: ${e}`, true);
							termStatus.textContent = `Error: ${e}`;
							termStatus.style.color = '#f48771';
							termContainer.classList.remove('active');
						}
						btnNew.disabled = false;
					};

					btnClose.onclick = async () => {
						if (currentTerminal && window.PtyPoc) {
							log(`Closing terminal #${currentTerminal.id}...`);
							await window.PtyPoc.closeTerminal(currentTerminal);
							log('✅ Terminal closed');
							termStatus.textContent = 'Terminal closed';
							termStatus.style.color = '#666';
							termContainer.classList.remove('active');
							termContainer.innerHTML = '';
							currentTerminal = null;
							btnClose.disabled = true;
						}
					};

				} catch (err) {
					log(`❌ Error: ${err.message || err}`, true);
					statusEl.textContent = `❌ Error: ${err.message || err}`;
				}
			})();
		</script>
		<!-- Phase 0-4: xterm.js + PTY bridge bundle -->
		<script src="pty-poc/dist/terminal.js"></script>
	</body>
</html>
