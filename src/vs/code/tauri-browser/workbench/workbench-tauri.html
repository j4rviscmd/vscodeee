<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta http-equiv="Content-Security-Policy" content="
		default-src
			'self'
			tauri:
			https://tauri.localhost
			vscode-file:
		;
		img-src
			'self'
			data:
			blob:
			https:
			tauri:
			https://tauri.localhost
			vscode-file:
			vscode-remote-resource:
		;
		media-src
			'self'
		;
		frame-src
			'self'
			vscode-webview:
			vscode-file:
		;
		script-src
			'self'
			'unsafe-eval'
			'unsafe-inline'
			blob:
			tauri:
			https://tauri.localhost
			vscode-file:
		;
		style-src
			'self'
			'unsafe-inline'
			vscode-file:
		;
		connect-src
			'self'
			https:
			ws:
			wss:
			tauri:
			https://tauri.localhost
			ipc:
			vscode-file:
		;
		font-src
			'self'
			https:
			vscode-file:
			vscode-remote-resource:
		;
	"/>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<!-- Console interceptor: forwards all console.* calls to Rust backend terminal -->
	<script src="console-interceptor/dist/console-interceptor.js"></script>
	<script>
		// Wait for Tauri API to be available, then install the interceptor.
		// __TAURI__ is injected by the webview runtime, but may not be ready at parse time.
		// Guard against console-interceptor.js failing to load (e.g. missing dist build).
		(function tryInstall() {
			if (typeof installConsoleInterceptor !== 'function') {
				return; // Script not loaded — skip silently
			}
			if (window.__TAURI__?.core?.invoke) {
				installConsoleInterceptor(window.__TAURI__.core.invoke, { passthrough: true });
				return;
			}
			setTimeout(tryInstall, 50);
		})();
	</script>
	<style>
		@keyframes splash-spin {
			to { transform: rotate(360deg); }
		}
		#splash {
			position: fixed;
			inset: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background-color: rgba(30, 30, 30, 0.75);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			z-index: 99999;
			transition: opacity 0.3s ease-out;
		}
		#splash.fade-out {
			opacity: 0;
		}
		.splash-watermark {
			opacity: 0.4;
			margin-bottom: 24px;
			user-select: none;
		}
		.splash-spinner {
			width: 28px;
			height: 28px;
			border: 2px solid rgba(204, 204, 204, 0.2);
			border-top-color: #CCCCCC;
			border-radius: 50%;
			animation: splash-spin 0.8s linear infinite;
		}
	</style>
	</head>
<body aria-label="">
	<div id="splash">
		<svg class="splash-watermark" width="120" height="120" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
			<text x="130" y="148" text-anchor="middle" font-family="'SF Mono','Menlo','Consolas','Courier New',monospace" font-size="52" font-weight="600" fill="#808080">&lt;eee/&gt;</text>
		</svg>
		<div class="splash-spinner"></div>
	</div>
</body>

<!-- Bootstrap (non-module): sets up NLS, CSS import maps, then dynamically imports workbench -->
<script src="workbench-tauri.js"></script>
</html>
